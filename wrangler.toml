name = "instock-bot"
main = "src/index.ts"
compatibility_date = "2024-10-22"

[triggers]
crons = ["* * * * *"]

[[d1_databases]]
binding = "D1_DB"
database_name = "instock_db"
database_id = "YOUR_D1_DATABASE_ID"  # Set your actual database ID
preview_database_id = "YOUR_PREVIEW_D1_DATABASE_ID"  # Set your preview database ID
